name: Build

on:
  push:
    branches: [master]

jobs:
  build_apk:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      # Firebase config files are gitignored — inject from repository secrets.
      # Required secrets: GOOGLE_SERVICES_JSON, FIREBASE_OPTIONS_DART
      - name: Write Firebase config files
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          echo '${{ secrets.FIREBASE_OPTIONS_DART }}' > lib/firebase_options.dart

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: paperless-debug-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14
